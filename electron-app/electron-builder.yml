appId: com.igtracker.app
productName: IG Tracker
copyright: Copyright © 2025

directories:
  output: release
  buildResources: public

files:
  - dist
  - dist-electron

# Windows
win:
  target:
    - target: nsis      # Installateur .exe classique
      arch: x64
  icon: public/icon.ico

# Installateur Windows (avec assistant d'installation)
nsis:
  oneClick: false                         # Montre l'assistant d'installation
  allowToChangeInstallationDirectory: true # L'utilisateur peut choisir le dossier
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: IG Tracker

# macOS (optionnel)
mac:
  target: dmg
  icon: public/icon.icns

# Linux (optionnel)
linux:
  target: AppImage
  icon: public/icon.png
