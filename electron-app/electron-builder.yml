appId: com.igtracker.app
productName: IG Tracker
copyright: Copyright © 2025

directories:
  output: release
  buildResources: public

files:
  - dist
  - dist-electron

# Windows — zip portable (pas d'installateur, pas besoin de Wine sur Linux)
win:
  target:
    - target: zip
      arch: x64
  signAndEditExecutable: false

# macOS (optionnel)
mac:
  target: dmg

# Linux (optionnel)
linux:
  target: AppImage
