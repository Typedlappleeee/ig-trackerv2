<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG Tracker — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070d;
    --surface: #0a0d16;
    --surface2: #0f1220;
    --surface3: #141825;
    --border: #1a1f2e;
    --border2: #222840;
    --accent: #c8f03c;
    --accent-dim: rgba(200,240,60,.12);
    --accent-glow: rgba(200,240,60,.06);
    --blue: #4d9fff;
    --blue-dim: rgba(77,159,255,.12);
    --danger: #ff4060;
    --danger-dim: rgba(255,64,96,.1);
    --ok: #22d4a0;
    --ok-dim: rgba(34,212,160,.1);
    --warn: #f59e0b;
    --warn-dim: rgba(245,158,11,.1);
    --text: #dce3f0;
    --text2: #6b7894;
    --text3: #3d4562;
    --sidebar-w: 220px;
    --header-h: 60px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 200;
  }
  .sidebar-brand {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .brand-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent); display: flex; align-items: center;
    justify-content: center; font-size: 15px; flex-shrink: 0;
    box-shadow: 0 0 20px rgba(200,240,60,.3);
  }
  .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
  .brand-sub  { font-size: 10px; color: var(--text2); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
  .sidebar-section { padding: 20px 12px 8px; }
  .sidebar-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; padding: 0 8px 8px; }
  .sidebar-link {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 8px; cursor: pointer;
    color: var(--text2); font-size: 13px; font-weight: 500;
    transition: all .15s ease; text-decoration: none; border: none;
    background: none; width: 100%; text-align: left;
  }
  .sidebar-link:hover { background: var(--surface2); color: var(--text); }
  .sidebar-link.active { background: var(--accent-dim); color: var(--accent); }
  .sidebar-link .icon { width: 16px; text-align: center; font-size: 14px; }
  .sidebar-link .badge {
    margin-left: auto; background: var(--danger); color: #fff;
    font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
  }
  .sidebar-footer {
    margin-top: auto; padding: 12px;
    border-top: 1px solid var(--border);
  }
  .refresh-btn {
    width: 100%; padding: 10px; border-radius: 8px;
    background: var(--accent); color: #05070d;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
    border: none; cursor: pointer; transition: all .15s ease;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .refresh-btn:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(200,240,60,.3); }
  .refresh-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
  .last-sync { text-align: center; font-size: 10px; color: var(--text3); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }

  /* ── Main ── */
  .main {
    margin-left: var(--sidebar-w);
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  .topbar {
    position: sticky; top: 0; z-index: 100;
    height: var(--header-h);
    background: rgba(5,7,13,.85);
    backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-title { font-size: 15px; font-weight: 600; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse-ok 2.5s ease-in-out infinite; }
  @keyframes pulse-ok { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-text { font-size: 12px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
  .content { padding: 28px; flex: 1; }

  /* ── Stats row ── */
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    position: relative; overflow: hidden;
    transition: border-color .2s ease, transform .2s ease;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card.c-blue::before  { background: var(--blue); }
  .stat-card.c-ok::before    { background: var(--ok); }
  .stat-card.c-danger::before{ background: var(--danger); }
  .stat-card.c-warn::before  { background: var(--warn); }
  .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .stat-icon { font-size: 20px; margin-bottom: 12px; opacity: .7; }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .stat-card.c-blue  .stat-value { color: var(--blue); }
  .stat-card.c-ok    .stat-value { color: var(--ok); }
  .stat-card.c-danger.stat-value { color: var(--danger); }
  .stat-card.c-warn  .stat-value { color: var(--warn); }

  /* ── Alerts ── */
  .alerts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .alert {
    background: var(--danger-dim); border: 1px solid rgba(255,64,96,.2);
    border-left: 3px solid var(--danger); border-radius: 8px;
    padding: 10px 14px; display: flex; align-items: center; gap: 10px;
    font-size: 13px; animation: slideDown .3s ease;
  }
  @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
  }
  .search-wrap {
    position: relative; flex: 1; max-width: 300px;
  }
  .search-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px 8px 34px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
    outline: none; transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
  .filter-chip {
    padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2); cursor: pointer; transition: all .15s;
  }
  .filter-chip:hover, .filter-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .count-tag { font-size: 11px; color: var(--text3); margin-left: auto; font-family: 'JetBrains Mono', monospace; }

  /* ── Grid ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 14px; }

  /* ── Account card ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
    animation: fadeUp .35s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
  .card:hover { border-color: var(--border2); box-shadow: 0 8px 40px rgba(0,0,0,.5); transform: translateY(-3px); }
  .card.banned { border-color: rgba(255,64,96,.3); background: rgba(255,64,96,.03); }
  .card.stopped { opacity: .55; }
  .card-top { padding: 16px 16px 12px; display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
    border: 2px solid var(--border2); flex-shrink: 0;
    background: var(--surface2);
  }
  .avatar-ph {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    background: var(--surface2); border: 2px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--text3);
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-name { font-size: 14px; font-weight: 700; letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sub  { font-size: 11px; color: var(--text2); margin-top: 2px; font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Badges */
  .badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; letter-spacing: .04em; }
  .badge-ok      { background: var(--ok-dim);     color: var(--ok);     border: 1px solid rgba(34,212,160,.25); }
  .badge-banned  { background: var(--danger-dim);  color: var(--danger); border: 1px solid rgba(255,64,96,.25); }
  .badge-warn    { background: var(--warn-dim);    color: var(--warn);   border: 1px solid rgba(245,158,11,.25); }
  .badge-none    { background: var(--surface2);    color: var(--text3);  border: 1px solid var(--border); }

  /* Stats row inside card */
  .card-nums { display: grid; grid-template-columns: repeat(3,1fr); border-top: 1px solid var(--border); }
  .num { padding: 12px 0; text-align: center; }
  .num + .num { border-left: 1px solid var(--border); }
  .num-val { font-size: 16px; font-weight: 700; }
  .num-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

  /* Video rows */
  .vids-section { padding: 10px 14px 14px; }
  .vids-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
  .vid-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .vid-row:last-child { border-bottom: none; }
  .vid-thumb { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text3); overflow: hidden; }
  .vid-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .vid-info { flex: 1; min-width: 0; }
  .vid-id { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--blue); text-decoration: none; }
  .vid-caption { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .vid-stats { display: flex; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); flex-shrink: 0; }

  /* Card footer */
  .card-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
  }
  .foot-time { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
  .link-form { display: flex; gap: 6px; flex: 1; }
  .link-form input {
    flex: 1; background: var(--surface3); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 9px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; outline: none;
    transition: border-color .15s;
  }
  .link-form input:focus { border-color: var(--accent); }
  .link-btn {
    background: var(--surface3); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px; color: var(--text2);
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all .15s; white-space: nowrap;
    font-family: 'Inter', sans-serif;
  }
  .link-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Empty state */
  .empty { text-align: center; padding: 80px 20px; color: var(--text3); grid-column: 1/-1; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* Spinner */
  .spinner {
    width: 14px; height: 14px; border: 2px solid rgba(200,240,60,.25);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .65s linear infinite; display: inline-block;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* Responsive */
  @media(max-width:900px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .stats-row { grid-template-columns: repeat(2,1fr); }
  }
  @media(max-width:600px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .grid { grid-template-columns: 1fr; }
    .content { padding: 16px; }
  }

  /* Skeleton loader */
  .skeleton { animation: skel 1.4s ease-in-out infinite; }
  @keyframes skel { 0%,100%{opacity:.3} 50%{opacity:.7} }
  .skel-block { background: var(--surface2); border-radius: 4px; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">📊</div>
    <div>
      <div class="brand-name">IG Tracker</div>
      <div class="brand-sub">v2.0 · dashboard</div>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Navigation</div>
    <button class="sidebar-link active" onclick="scrollTo({top:0,behavior:'smooth'})">
      <span class="icon">⊞</span> Aperçu
    </button>
    <button class="sidebar-link" onclick="document.getElementById('alertsZone').scrollIntoView({behavior:'smooth'})">
      <span class="icon">⚠</span> Alertes
      <span class="badge" id="alertBadge" style="display:none">0</span>
    </button>
    <button class="sidebar-link" onclick="document.getElementById('grid').scrollIntoView({behavior:'smooth'})">
      <span class="icon">📱</span> Comptes
    </button>
  </div>
  <div class="sidebar-footer">
    <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">
      ↺ Synchroniser
    </button>
    <div class="last-sync" id="lastSync">Jamais synchronisé</div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <div class="topbar-title">Dashboard</div>
    <div class="topbar-right">
      <div class="status-dot"></div>
      <span class="status-text" id="statusText">En attente…</span>
    </div>
  </header>

  <div class="content">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card c-blue">
        <div class="stat-icon">📱</div>
        <div class="stat-label">Téléphones GéeLark</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card c-ok">
        <div class="stat-icon">✓</div>
        <div class="stat-label">Comptes actifs</div>
        <div class="stat-value" id="statActive" style="color:var(--ok)">—</div>
      </div>
      <div class="stat-card c-danger">
        <div class="stat-icon">⚠</div>
        <div class="stat-label">Bannis / Erreurs</div>
        <div class="stat-value" id="statBanned" style="color:var(--danger)">—</div>
      </div>
      <div class="stat-card c-warn">
        <div class="stat-icon">👁</div>
        <div class="stat-label">Vues vidéos totales</div>
        <div class="stat-value" id="statViews" style="color:var(--warn)">—</div>
      </div>
    </div>

    <!-- Alerts -->
    <div class="alerts" id="alertsZone"></div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Rechercher un compte…" id="searchInput" oninput="filterCards()">
      </div>
      <button class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">Tous</button>
      <button class="filter-chip" data-filter="active" onclick="setFilter('active',this)">Actifs</button>
      <button class="filter-chip" data-filter="issues" onclick="setFilter('issues',this)">Problèmes</button>
      <button class="filter-chip" data-filter="noig" onclick="setFilter('noig',this)">Sans IG</button>
      <span class="count-tag" id="countTag">0 comptes</span>
    </div>

    <!-- Grid -->
    <div class="grid" id="grid">
      <div class="empty">
        <div class="empty-icon">📡</div>
        <div class="empty-title">Chargement…</div>
        <div class="empty-sub">Récupération des données GéeLark</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────
const fmt = n => {
  if (!n) return '0';
  n = parseInt(n);
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
};
const timeAgo = iso => {
  if (!iso) return '—';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60)    return "à l'instant";
  if (s < 3600)  return `${Math.floor(s/60)}m`;
  if (s < 86400) return `${Math.floor(s/3600)}h`;
  return `${Math.floor(s/86400)}j`;
};
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── State ──────────────────────────────────────────────────────────────────
let allData = {};
let currentFilter = 'all';

// ── Render ─────────────────────────────────────────────────────────────────
function badge(d) {
  if (!d.ig_username) return '<span class="badge badge-none">— no ig</span>';
  const s = d.ig_status;
  if (s === 'active')               return '<span class="badge badge-ok">● actif</span>';
  if (s === 'banned_or_deleted')    return '<span class="badge badge-banned">✕ banni</span>';
  if (s === 'private_or_restricted')return '<span class="badge badge-warn">⚠ privé</span>';
  if (s === 'error')                return '<span class="badge badge-warn">⚠ erreur</span>';
  return '<span class="badge badge-none">— —</span>';
}

function renderCard(id, d, idx) {
  const banned = d.ig_status === 'banned_or_deleted';
  const stopped = d.gl_status === 'stopped';
  const cls = banned ? ' banned' : stopped ? ' stopped' : '';
  const name = d.ig_username ? `@${esc(d.ig_username)}` : esc(d.phone_name || id);
  const sub  = d.ig_username ? `GéeLark · ${esc(d.phone_name||id)}` : `ID · ${esc(id)}`;
  const av   = d.profile_pic
    ? `<img class="avatar" src="${esc(d.profile_pic)}" onerror="this.outerHTML='<div class=\\'avatar-ph\\'>📱</div>'">`
    : '<div class="avatar-ph">📱</div>';

  const totalViews = (d.videos||[]).reduce((a,v)=>a+(v.views||0),0);
  const vids = (d.videos||[]).slice(0,3).map(v=>`
    <div class="vid-row">
      <div class="vid-thumb">${v.thumbnail?`<img src="${esc(v.thumbnail)}">`:'▶'}</div>
      <div class="vid-info">
        <a class="vid-id" href="${esc(v.url||'#')}" target="_blank">${esc(v.id||'—')}</a>
        <div class="vid-caption">${esc(v.caption||'(pas de caption)')}</div>
      </div>
      <div class="vid-stats"><span>👁 ${fmt(v.views)}</span><span>♥ ${fmt(v.likes)}</span></div>
    </div>`).join('');

  let body = '';
  if (d.ig_status === 'active') {
    body = `
      <div class="card-nums">
        <div class="num"><div class="num-val">${fmt(d.followers)}</div><div class="num-lbl">Followers</div></div>
        <div class="num"><div class="num-val">${fmt(d.following)}</div><div class="num-lbl">Following</div></div>
        <div class="num"><div class="num-val">${d.posts_count||0}</div><div class="num-lbl">Posts</div></div>
      </div>
      <div class="vids-section">
        <div class="vids-title">Dernières vidéos · ${fmt(totalViews)} vues</div>
        ${vids || '<div style="color:var(--text3);font-size:12px;padding:4px 0">Aucune vidéo</div>'}
      </div>`;
  } else if (banned) {
    body = `<div style="padding:14px 16px;font-size:13px;color:var(--danger)">✕ Compte introuvable — banni ou supprimé</div>`;
  } else if (d.ig_status === 'error') {
    body = `<div style="padding:14px 16px;font-size:13px;color:var(--warn)">⚠ ${esc(d.ig_error||'Erreur de connexion')}</div>`;
  } else if (!d.ig_username) {
    body = `<div style="padding:12px 16px;font-size:12px;color:var(--text3);font-style:italic">Associe un username Instagram ↓</div>`;
  }

  return `<div class="card${cls}" style="animation-delay:${Math.min(idx*.04,.5)}s" data-status="${d.ig_status||'none'}" data-hasig="${!!d.ig_username}" data-id="${esc(id)}">
    <div class="card-top">
      ${av}
      <div class="card-meta">
        <div class="card-name">${name}</div>
        <div class="card-sub">${sub}</div>
      </div>
      ${badge(d)}
    </div>
    ${body}
    <div class="card-footer">
      <span class="foot-time">${timeAgo(d.last_checked)}</span>
      <div class="link-form">
        <input type="text" placeholder="@username_ig" id="inp_${esc(id)}" value="${esc(d.ig_username||'')}">
        <button class="link-btn" onclick="setUsername('${esc(id)}')">Lier</button>
      </div>
    </div>
  </div>`;
}

// ── Filter / Search ─────────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filterCards();
}

function filterCards() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  let visible = 0;
  document.querySelectorAll('.card').forEach(card => {
    const status = card.dataset.status;
    const hasig  = card.dataset.hasig === 'true';
    const text   = card.textContent.toLowerCase();
    let show = true;
    if (currentFilter === 'active')  show = status === 'active';
    if (currentFilter === 'issues')  show = ['banned_or_deleted','error','private_or_restricted'].includes(status);
    if (currentFilter === 'noig')    show = !hasig;
    if (q && !text.includes(q))      show = false;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('countTag').textContent = `${visible} compte${visible!==1?'s':''}`;
}

// ── Data ───────────────────────────────────────────────────────────────────
function updateStats(data) {
  const vals = Object.values(data);
  const active = vals.filter(d=>d.ig_status==='active').length;
  const issues = vals.filter(d=>['banned_or_deleted','error'].includes(d.ig_status)).length;
  const views  = vals.reduce((s,d)=>s+(d.videos||[]).reduce((b,v)=>b+(v.views||0),0),0);
  document.getElementById('statTotal').textContent  = vals.length;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statBanned').textContent = issues;
  document.getElementById('statViews').textContent  = fmt(views);
  document.getElementById('statusText').textContent = `${vals.length} téléphones · ${active} actifs`;
}

function updateAlerts(data) {
  const banned = Object.entries(data).filter(([,d])=>d.ig_status==='banned_or_deleted');
  const zone = document.getElementById('alertsZone');
  const badge = document.getElementById('alertBadge');
  zone.innerHTML = banned.map(([,d])=>`
    <div class="alert">🚨 <span><strong>@${esc(d.ig_username)}</strong> — compte banni ou supprimé · vérifié il y a ${timeAgo(d.last_checked)}</span></div>`).join('');
  if (banned.length > 0) {
    badge.textContent = banned.length;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

async function loadData() {
  const res = await fetch('/api/accounts');
  const data = await res.json();
  allData = data;
  updateStats(data);
  updateAlerts(data);
  const entries = Object.entries(data);
  const grid = document.getElementById('grid');
  if (!entries.length) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">📡</div>
      <div class="empty-title">Aucun téléphone GéeLark</div>
      <div class="empty-sub">Clique sur Synchroniser pour charger tes téléphones</div>
    </div>`;
    return;
  }
  grid.innerHTML = entries.map(([id,d],i)=>renderCard(id,d,i)).join('');
  const times = entries.map(([,d])=>d.last_checked).filter(Boolean).sort().reverse();
  if (times[0]) {
    document.getElementById('lastSync').textContent = 'Màj · ' + new Date(times[0]).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }
  filterCards();
}

async function doRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Synchronisation…';
  try { await fetch('/api/refresh'); await loadData(); }
  catch(e) { console.error(e); }
  finally {
    btn.disabled = false;
    btn.innerHTML = '↺ Synchroniser';
  }
}

async function setUsername(phoneId) {
  const input = document.getElementById('inp_' + phoneId);
  const username = (input.value||'').trim().replace('@','');
  if (!username) return;
  await fetch('/api/accounts/set-username', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({phone_id: phoneId, username})
  });
  await doRefresh();
}

// Init
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
