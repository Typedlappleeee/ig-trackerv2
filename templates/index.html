<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f; --surface: #0e1118; --surface2: #141720;
    --border: #1e2330; --accent: #e8ff47; --accent2: #47c2ff;
    --danger: #ff4757; --warn: #ffa94d; --ok: #69db7c; --muted: #4a5068; --text: #e2e6f0; --text2: #8891aa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,10,15,0.9); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px;
  }
  .logo { font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)} }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .last-refresh { font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--muted); }
  .btn { font-family: 'Syne', sans-serif; font-size: .8rem; font-weight: 600; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; transition: all .15s ease; display: flex; align-items: center; gap: 6px; }
  .btn-accent { background: var(--accent); color: #080a0f; }
  .btn-accent:hover { background: #d4e83d; transform: translateY(-1px); }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
  .summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .stat-value { font-size: 2rem; font-weight: 800; line-height: 1; }
  .alerts { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: .5rem; }
  .alert-item { background: rgba(255,71,87,.08); border: 1px solid rgba(255,71,87,.3); border-left: 3px solid var(--danger); border-radius: 8px; padding: .75rem 1rem; font-size: .88rem; color: var(--danger); display: flex; align-items: center; gap: 10px; }
  .accounts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap: 1rem; }
  .account-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: all .2s ease; animation: fadeUp .4s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  .account-card:hover { border-color: #2a3040; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
  .account-card.banned { border-color: rgba(255,71,87,.4); background: rgba(255,71,87,.04); }
  .account-card.stopped { opacity: .65; }
  .card-header { padding: 1.2rem 1.2rem 1rem; display: flex; align-items: center; gap: 12px; }
  .avatar { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }
  .avatar-placeholder { width: 46px; height: 46px; border-radius: 50%; background: var(--surface2); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; color: var(--muted); }
  .card-info { flex: 1; min-width: 0; }
  .card-username { font-weight: 700; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-subtitle { font-size: .72rem; color: var(--text2); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .status-badge { font-family: 'DM Mono', monospace; font-size: .65rem; font-weight: 500; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0; }
  .badge-active { background: rgba(105,219,124,.15); color: var(--ok); border: 1px solid rgba(105,219,124,.3); }
  .badge-banned { background: rgba(255,71,87,.15); color: var(--danger); border: 1px solid rgba(255,71,87,.3); }
  .badge-warn { background: rgba(255,169,77,.15); color: var(--warn); border: 1px solid rgba(255,169,77,.3); }
  .badge-stopped { background: rgba(74,80,104,.2); color: var(--muted); border: 1px solid var(--border); }
  .card-stats { display: grid; grid-template-columns: repeat(3,1fr); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .cs { padding: .85rem 0; text-align: center; }
  .cs+.cs { border-left: 1px solid var(--border); }
  .cs-val { font-weight: 700; font-size: 1.05rem; }
  .cs-lbl { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted); margin-top: 2px; }
  .videos-section { padding: .75rem 1.2rem 1rem; }
  .videos-title { font-size: .7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .6rem; }
  .video-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: .82rem; }
  .video-row:last-child { border-bottom: none; }
  .video-thumb { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
  .video-meta { flex: 1; min-width: 0; }
  .video-caption { font-size: .75rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .video-stats { display: flex; gap: 10px; font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--muted); flex-shrink: 0; }
  .card-footer { padding: .6rem 1.2rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); gap: 8px; }
  .last-check { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted); }
  .set-username-form { display: flex; gap: 6px; flex: 1; }
  .set-username-form input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: .75rem; outline: none; }
  .set-username-form input:focus { border-color: var(--accent); }
  .btn-small { font-family: 'Syne', sans-serif; font-size: .72rem; font-weight: 600; padding: 5px 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); cursor: pointer; white-space: nowrap; }
  .btn-small:hover { border-color: var(--accent); color: var(--accent); }
  .no-username-msg { padding: 1rem 1.2rem; font-size: .82rem; color: var(--muted); font-style: italic; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(232,255,71,.2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty { text-align: center; padding: 5rem 2rem; color: var(--muted); }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  @media(max-width:768px){.summary{grid-template-columns:repeat(2,1fr)}.accounts-grid{grid-template-columns:1fr}header{padding:0 1rem}.container{padding:1rem}}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>IG Tracker</div>
  <div class="header-right">
    <span class="last-refresh" id="lastRefresh">—</span>
    <button class="btn btn-accent" id="refreshBtn" onclick="doRefresh()">↺ Refresh</button>
  </div>
</header>
<div class="container">
  <div class="summary">
    <div class="stat-card"><div class="stat-label">Téléphones GéeLark</div><div class="stat-value" style="color:var(--accent2)" id="statTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">Comptes actifs</div><div class="stat-value" style="color:var(--ok)" id="statActive">—</div></div>
    <div class="stat-card"><div class="stat-label">Bannis / Erreurs</div><div class="stat-value" style="color:var(--danger)" id="statBanned">—</div></div>
    <div class="stat-card"><div class="stat-label">Total vues vidéos</div><div class="stat-value" style="color:var(--warn)" id="statViews">—</div></div>
  </div>
  <div class="alerts" id="alertsZone"></div>
  <div class="accounts-grid" id="grid"></div>
</div>

<script>
const fmt = n => { if(!n)return'0'; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n.toString(); };
const timeAgo = iso => { if(!iso)return'—'; const d=Math.floor((Date.now()-new Date(iso))/1000); if(d<60)return"à l'instant"; if(d<3600)return`il y a ${Math.floor(d/60)}m`; if(d<86400)return`il y a ${Math.floor(d/3600)}h`; return`il y a ${Math.floor(d/86400)}j`; };

function renderBadge(d) {
  const s = d.ig_status;
  if(!d.ig_username) return '<span class="status-badge badge-stopped">⚙ Sans IG</span>';
  if(s==='active') return '<span class="status-badge badge-active">● Actif</span>';
  if(s==='banned_or_deleted') return '<span class="status-badge badge-banned">✕ Banni</span>';
  if(s==='private_or_restricted') return '<span class="status-badge badge-warn">⚠ Privé</span>';
  if(s==='error') return '<span class="status-badge badge-warn">⚠ Erreur</span>';
  return '<span class="status-badge badge-stopped">— —</span>';
}

function renderCard(phoneId, d, i) {
  const bannedClass = d.ig_status==='banned_or_deleted'?' banned': d.gl_status==='stopped'?' stopped':'';
  const displayName = d.ig_username ? `@${d.ig_username}` : (d.phone_name||phoneId);
  const subTitle = d.ig_username ? `GéeLark: ${d.phone_name||phoneId}` : `GéeLark ID: ${phoneId}`;
  const avatar = d.profile_pic ? `<img class="avatar" src="${d.profile_pic}" onerror="this.style.display='none'">` : `<div class="avatar-placeholder">📱</div>`;

  const totalViews = (d.videos||[]).reduce((a,v)=>a+(v.views||0),0);
  const videoRows = (d.videos||[]).slice(0,3).map(v=>`
    <div class="video-row">
      <div style="width:36px;height:36px;border-radius:6px;background:var(--surface2);flex-shrink:0;overflow:hidden">
        ${v.thumbnail?`<img class="video-thumb" src="${v.thumbnail}">`:'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:.9rem">▶</div>'}
      </div>
      <div class="video-meta">
        <a href="${v.url}" target="_blank" style="color:var(--accent2);text-decoration:none;font-size:.72rem;font-family:'DM Mono',monospace">${v.id||'—'}</a>
        <div class="video-caption">${v.caption||'(pas de caption)'}</div>
      </div>
      <div class="video-stats"><span>👁 ${fmt(v.views)}</span><span>♥ ${fmt(v.likes)}</span></div>
    </div>`).join('');

  let body = '';
  if(d.ig_status==='active') {
    body = `
      <div class="card-stats">
        <div class="cs"><div class="cs-val">${fmt(d.followers)}</div><div class="cs-lbl">Followers</div></div>
        <div class="cs"><div class="cs-val">${fmt(d.following)}</div><div class="cs-lbl">Following</div></div>
        <div class="cs"><div class="cs-val">${d.posts_count||0}</div><div class="cs-lbl">Posts</div></div>
      </div>
      <div class="videos-section">
        <div class="videos-title">Dernières vidéos · ${fmt(totalViews)} vues</div>
        ${videoRows||'<div style="color:var(--muted);font-size:.8rem">Aucune vidéo</div>'}
      </div>`;
  } else if(d.ig_status==='banned_or_deleted') {
    body = `<div style="padding:1rem 1.2rem;font-size:.82rem;color:var(--danger)">✕ Compte introuvable — banni ou supprimé</div>`;
  } else if(d.ig_status==='error') {
    body = `<div style="padding:1rem 1.2rem;font-size:.82rem;color:var(--warn)">⚠ ${d.ig_error||'Erreur de connexion'}</div>`;
  } else if(!d.ig_username) {
    body = `<div class="no-username-msg">Associe un username Instagram à ce téléphone ↓</div>`;
  }

  return `<div class="account-card${bannedClass}" style="animation-delay:${i*.05}s">
    <div class="card-header">
      ${avatar}
      <div class="card-info">
        <div class="card-username">${displayName}</div>
        <div class="card-subtitle">${subTitle}</div>
      </div>
      ${renderBadge(d)}
    </div>
    ${body}
    <div class="card-footer">
      <span class="last-check">Vérifié ${timeAgo(d.last_checked)}</span>
      <div class="set-username-form">
        <input type="text" placeholder="@username_ig" id="inp_${phoneId}" value="${d.ig_username||''}">
        <button class="btn-small" onclick="setUsername('${phoneId}')">Lier</button>
      </div>
    </div>
  </div>`;
}

function updateSummary(data) {
  const entries = Object.values(data);
  const active = entries.filter(d=>d.ig_status==='active').length;
  const banned = entries.filter(d=>d.ig_status==='banned_or_deleted'||d.ig_status==='error').length;
  const views  = entries.reduce((s,d)=>s+(d.videos||[]).reduce((b,v)=>b+(v.views||0),0),0);
  document.getElementById('statTotal').textContent  = entries.length;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statBanned').textContent = banned;
  document.getElementById('statViews').textContent  = fmt(views);
}

function updateAlerts(data) {
  const zone = document.getElementById('alertsZone');
  const banned = Object.entries(data).filter(([,d])=>d.ig_status==='banned_or_deleted');
  zone.innerHTML = banned.map(([,d])=>`
    <div class="alert-item">🚨 <span><strong>@${d.ig_username}</strong> semble banni ou supprimé — vérifié ${timeAgo(d.last_checked)}</span></div>`).join('');
}

async function loadData() {
  const r = await fetch('/api/accounts');
  const data = await r.json();
  updateSummary(data);
  updateAlerts(data);
  const entries = Object.entries(data);
  const grid = document.getElementById('grid');
  if(!entries.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div style="font-size:3rem;margin-bottom:1rem">📱</div>
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:.5rem">Aucun téléphone GéeLark détecté</div>
      <div style="font-size:.85rem">Clique sur Refresh pour charger tes téléphones</div>
    </div>`;
    return;
  }
  grid.innerHTML = entries.map(([id,d],i)=>renderCard(id,d,i)).join('');
  const times = entries.map(([,d])=>d.last_checked).filter(Boolean).sort().reverse();
  if(times[0]) document.getElementById('lastRefresh').textContent = 'Màj '+timeAgo(times[0]);
}

async function doRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Refresh...';
  try { await fetch('/api/refresh'); await loadData(); }
  finally { btn.disabled=false; btn.innerHTML='↺ Refresh'; }
}

async function setUsername(phoneId) {
  const input = document.getElementById('inp_'+phoneId);
  const username = input.value.trim().replace('@','');
  if(!username) return;
  await fetch('/api/accounts/set-username', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone_id: phoneId, username}) });
  await doRefresh();
}

loadData();
setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
